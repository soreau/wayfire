#name: Manual Wayfire Tests for Branch and PR CI
#on:
#  workflow_dispatch:
#    inputs:
#      branch:
#        description: 'Branch name for wayfire-A'
#        required: true
#        type: string
#      pr_number:
#        description: 'Pull Request number for wayfire-B'
#        required: true
