name: Manual PR CI
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to run CI for'
        required: true
        type: string
jobs:
  wayfire_tests:
    name: "Test Wayfire on Ubuntu 24.04 Noble"
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --privileged
    steps:
    - run: apt update && apt install -y software-properties-common
    - run: apt update && apt install -y git build-essential binutils pkg-config meson ninja-build musl-dev libwayland-dev libinput-dev libevdev-dev libxkbcommon-dev libglm-dev libgl1-mesa-dev libcairo2-dev libpango1.0-dev libudev-dev libxml2-dev libseat-dev libxcb1-dev libxcb-util-dev xwayland doctest-dev cmake hwdata nlohmann-json3-dev python3-pip curl libgbm-dev liblcms2-dev gcc-12 g++-12 libgtk-4-dev libgtkmm-4.0-dev libgtk-layer-shell-dev libpulse-dev libdbusmenu-gtk3-dev libasound2-dev psmisc imagemagick libgraphicsmagick1-dev
    - run: git clone https://github.com/emersion/hello-wayland && cd hello-wayland && make && cp hello-wayland /usr/bin/hello-wayland && cd .. && rm -rf hello-wayland
    - run: git clone https://gitlab.freedesktop.org/wayland/wayland && cd wayland && git checkout 1.23.0 && meson setup build -Ddocumentation=false -Dtests=false --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf wayland
    - run: git clone https://gitlab.freedesktop.org/wayland/wayland-protocols && cd wayland-protocols && git checkout 1.47 && meson setup build --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf wayland-protocols
    - run: git clone https://gitlab.freedesktop.org/pixman/pixman && cd pixman && meson setup build --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf pixman
    - run: git clone https://gitlab.freedesktop.org/mesa/drm && cd drm && meson setup build --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf drm
    - run: git clone https://gitlab.freedesktop.org/emersion/libdisplay-info && cd libdisplay-info && meson setup build --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf libdisplay-info
    - run: git clone https://git.sr.ht/~emersion/grim && cd grim && meson setup build --prefix=/usr && ninja -C build && ninja -C build install && cd .. && rm -rf grim
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.pr_number }}
    - run: git config --global --add safe.directory /__w/wayfire/wayfire
    - run: git config --global --add safe.directory /__w/wayfire/wayfire/subprojects/wf-config
    - run: git config --global --add safe.directory /__w/wayfire/wayfire/subprojects/wf-touch
    - run: git config --global --add safe.directory /__w/wayfire/wayfire/subprojects/wf-utils
    - run: git config --global --add safe.directory /__w/wayfire/wayfire/subprojects/wlroots
    - run: git submodule sync --recursive && git submodule update --init --force --recursive
    - run: CC=gcc-12 CXX=g++-12 meson setup build -Dwlroots:c_std=c17 -Dtests=disabled -Duse_system_wlroots=disabled --prefix=/usr
    - run: ninja -v -Cbuild
    - run: ninja -v -Cbuild install
    - run: echo "Number of processors = "; grep processor /proc/cpuinfo | wc -l
    - run: XDG_RUNTIME_DIR=/tmp LP_NUM_THREADS=0 WLR_RENDERER_FORCE_SOFTWARE=1 WLR_BACKENDS=headless wayfire -r -d wlroots & sleep 7; WAYLAND_DISPLAY=/tmp/wayland-1 hello-wayland & sleep 3; WAYLAND_DISPLAY=/tmp/wayland-1 grim screenshot.png && killall wayfire
    - uses: actions/upload-artifact@v4
      with:
        name: wayfire-screenshot
        path: screenshot.png
        retention-days: 1
